<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Crescent Beauty Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <!-- Login Section -->
  <div id="login-section" class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
      <h2 class="text-2xl font-bold text-pink-700 text-center">Admin Login</h2>
      <input id="adminEmail" type="email" placeholder="Email" class="w-full border p-3 rounded mt-4">
      <input id="adminPassword" type="password" placeholder="Password" class="w-full border p-3 rounded mt-2">
      <button onclick="loginAdmin()" class="w-full bg-pink-600 text-white py-3 rounded mt-4 hover:bg-pink-700">Login</button>
      <p id="login-error" class="text-red-500 text-sm text-center mt-2 hidden"></p>
    </div>
  </div>

  <!-- Dashboard (hidden until login) -->
  <div id="dashboard-section" class="hidden">
    <nav class="bg-white shadow-md px-6 py-3 flex justify-between items-center">
      <h1 class="text-xl font-bold text-pink-700">Admin Dashboard</h1>
      <button onclick="logoutAdmin()" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Logout</button>
    </nav>

    <div class="container mx-auto px-4 py-6">
      <!-- Tabs -->
      <div class="flex gap-4 border-b pb-2">
        <button onclick="showTab('products')" id="tab-products" class="font-semibold text-pink-600 border-b-2 border-pink-600 pb-2">Add Product</button>
        <button onclick="showTab('orders')" id="tab-orders" class="font-semibold text-gray-500 pb-2 hover:text-gray-700">Manage Orders</button>
      </div>

      <!-- Tab: Add Product -->
      <div id="tab-products-content" class="mt-6">
        <div class="bg-white p-6 rounded-lg shadow max-w-2xl">
          <h2 class="text-2xl font-bold mb-4">Add New Product</h2>
          <form id="addProductForm">
            <input type="text" id="prodName" placeholder="Product Name" required class="w-full border p-3 rounded mb-3">
            <input type="number" id="prodPrice" placeholder="Price (₦)" required class="w-full border p-3 rounded mb-3">
            <select id="prodCategory" required class="w-full border p-3 rounded mb-3">
              <option value="">Select Category</option>
              <option value="Perfumes">Perfumes</option>
              <option value="Body Sprays">Body Sprays</option>
              <option value="Body Creams">Body Creams</option>
              <option value="Face Creams">Face Creams</option>
              <option value="Hair Creams">Hair Creams</option>
            </select>
            <input type="number" id="prodStock" placeholder="Stock Quantity" required class="w-full border p-3 rounded mb-3">
            <textarea id="prodDesc" placeholder="Description" rows="3" class="w-full border p-3 rounded mb-3"></textarea>
            <input type="file" id="prodImages" accept="image/*" multiple required class="w-full border p-2 rounded mb-3">
            <p class="text-sm text-gray-500 mb-3">Hold Ctrl/Cmd to select multiple images.</p>
            <button type="submit" class="bg-pink-600 text-white px-6 py-2 rounded hover:bg-pink-700">Add Product</button>
          </form>
        </div>
      </div>

      <!-- Tab: Manage Orders -->
      <div id="tab-orders-content" class="hidden mt-6">
        <div class="bg-white p-6 rounded-lg shadow overflow-x-auto">
          <h2 class="text-2xl font-bold mb-4">Orders</h2>
          <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b">
              <tr>
                <th class="text-left p-2">Order ID</th>
                <th class="text-left p-2">Customer</th>
                <th class="text-left p-2">Total</th>
                <th class="text-left p-2">Status</th>
                <th class="text-left p-2">Receipt</th>
              </tr>
            </thead>
            <tbody id="orders-table-body">
              <tr><td colspan="5" class="text-center p-4 text-gray-500">Loading orders...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== JAVASCRIPT ==================== -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script>
    // 1. CONFIG
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const IK_PUBLIC_KEY = "your_imagekit_public_key";

    // 2. AUTH STATE
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard-section').style.display = 'block';
        loadOrders();
      } else {
        document.getElementById('login-section').style.display = 'flex';
        document.getElementById('dashboard-section').style.display = 'none';
      }
    });

    window.loginAdmin = function() {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      auth.signInWithEmailAndPassword(email, password)
        .catch(error => {
          document.getElementById('login-error').textContent = error.message;
          document.getElementById('login-error').classList.remove('hidden');
        });
    };

    window.logoutAdmin = function() {
      auth.signOut();
    };

    // 3. TAB SWITCHING
    window.showTab = function(tab) {
      document.getElementById('tab-products-content').classList.toggle('hidden', tab !== 'products');
      document.getElementById('tab-orders-content').classList.toggle('hidden', tab !== 'orders');
      document.getElementById('tab-products').classList.toggle('border-pink-600', tab === 'products');
      document.getElementById('tab-products').classList.toggle('text-pink-600', tab === 'products');
      document.getElementById('tab-products').classList.toggle('text-gray-500', tab !== 'products');
      document.getElementById('tab-orders').classList.toggle('border-pink-600', tab === 'orders');
      document.getElementById('tab-orders').classList.toggle('text-pink-600', tab === 'orders');
      document.getElementById('tab-orders').classList.toggle('text-gray-500', tab !== 'orders');
    };

    // 4. IMAGEKIT UPLOAD (for admin)
    async function uploadToImageKit(file, folder) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("fileName", file.name);
      formData.append("folder", folder);
      const response = await fetch("https://upload.imagekit.io/api/v1/files/upload", {
        method: "POST",
        headers: { "Authorization": `Basic ${btoa(IK_PUBLIC_KEY + ":")}` },
        body: formData
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.message);
      return data.url;
    }

    // 5. ADD PRODUCT
    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('prodName').value.trim();
      const price = parseFloat(document.getElementById('prodPrice').value);
      const category = document.getElementById('prodCategory').value;
      const stock = parseInt(document.getElementById('prodStock').value);
      const desc = document.getElementById('prodDesc').value.trim();
      const files = document.getElementById('prodImages').files;

      if (files.length === 0) {
        alert('Please select at least one image.');
        return;
      }

      try {
        const imageUrls = [];
        for (let file of files) {
          const url = await uploadToImageKit(file, "/products");
          imageUrls.push(url);
        }

        const newRef = db.ref('products').push();
        await newRef.set({
          id: newRef.key,
          name: name,
          price: price,
          category: category,
          stock: stock,
          description: desc,
          images: imageUrls,
          thumbnail: imageUrls[0] + "?tr=w-300,h-300,fo-auto",
          createdAt: firebase.database.ServerValue.TIMESTAMP
        });

        alert('Product added successfully!');
        document.getElementById('addProductForm').reset();
      } catch (err) {
        alert('Error adding product: ' + err.message);
        console.error(err);
      }
    });

    // 6. MANAGE ORDERS (REAL-TIME)
    function loadOrders() {
      const ordersRef = db.ref('orders').orderByChild('placedAt');
      ordersRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('orders-table-body');
        tbody.innerHTML = '';

        if (!data) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-gray-500">No orders yet.</td></tr>';
          return;
        }

        for (let id in data) {
          const o = data[id];
          const statusOptions = ['pending', 'paid', 'shipped', 'delivered'];
          const optionsHtml = statusOptions.map(status =>
            `<option value="${status}" ${o.paymentStatus === status ? 'selected' : ''}>${status.charAt(0).toUpperCase() + status.slice(1)}</option>`
          ).join('');

          tbody.innerHTML += `
            <tr class="border-b hover:bg-gray-50">
              <td class="p-2 font-mono text-xs">${o.orderId || id.slice(-6)}</td>
              <td class="p-2">${o.customerName || 'N/A'}</td>
              <td class="p-2 font-bold">₦${(o.totalAmount || 0).toLocaleString()}</td>
              <td class="p-2">
                <select onchange="updateStatus('${id}', this.value)" class="border rounded px-2 py-1 text-sm">
                  ${optionsHtml}
                </select>
              </td>
              <td class="p-2">
                <a href="${o.receiptUrl || '#'}" target="_blank" class="text-pink-600 hover:underline text-sm">View Receipt</a>
              </td>
            </tr>
          `;
        }
      });
    }

    window.updateStatus = function(orderId, newStatus) {
      db.ref(`orders/${orderId}/paymentStatus`).set(newStatus)
        .then(() => console.log('Status updated'))
        .catch(err => alert('Error updating status: ' + err.message));
    };
  </script>
</body>
</html>
