<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Crescent Beauty Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navbar (Minimal) -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold text-pink-700">Cresent Beauty Hub</a>
      <a href="index.html" class="text-gray-600 hover:text-pink-600 text-sm">← Continue Shopping</a>
    </div>
  </nav>

  <!-- Cart Section -->
  <div class="container mx-auto px-4 py-8 max-w-4xl">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Your Shopping Cart</h1>
    <div id="cart-container">
      <!-- Cart items rendered here -->
    </div>
    <div id="cart-summary" class="mt-8 bg-white p-6 rounded-lg shadow-md hidden">
      <div class="flex justify-between text-xl font-bold">
        <span>Total:</span>
        <span id="cart-total" class="text-pink-600">₦0</span>
      </div>
      <a href="checkout.html" class="mt-4 block w-full bg-pink-600 hover:bg-pink-700 text-white text-center py-3 rounded-lg transition">Proceed to Checkout</a>
    </div>
    <div id="empty-cart" class="text-center py-12 hidden">
      <p class="text-gray-500 text-lg">Your cart is empty.</p>
      <a href="index.html" class="mt-4 inline-block bg-pink-600 text-white px-6 py-2 rounded">Shop Now</a>
    </div>
  </div>

  <script>
    // 1. RENDER CART
    function renderCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('cart-container');
      const summary = document.getElementById('cart-summary');
      const empty = document.getElementById('empty-cart');
      const totalSpan = document.getElementById('cart-total');

      if (cart.length === 0) {
        container.innerHTML = '';
        summary.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');
      summary.classList.remove('hidden');

      let total = 0;
      container.innerHTML = cart.map((item, index) => {
        const subtotal = item.price * item.qty;
        total += subtotal;
        return `
          <div class="flex flex-col md:flex-row items-center gap-4 bg-white p-4 rounded-lg shadow mb-4">
            <img src="${item.image || 'https://via.placeholder.com/80'}" alt="${item.name}" class="w-20 h-20 object-cover rounded">
            <div class="flex-1">
              <h3 class="font-semibold text-gray-800">${item.name}</h3>
              <p class="text-pink-600 font-bold">₦${item.price.toLocaleString()}</p>
            </div>
            <div class="flex items-center gap-2">
              <button onclick="updateQty(${index}, -1)" class="bg-gray-200 px-3 py-1 rounded hover:bg-gray-300">-</button>
              <span class="w-8 text-center font-semibold">${item.qty}</span>
              <button onclick="updateQty(${index}, 1)" class="bg-gray-200 px-3 py-1 rounded hover:bg-gray-300">+</button>
            </div>
            <button onclick="removeItem(${index})" class="text-red-500 hover:text-red-700 text-sm">Remove</button>
          </div>
        `;
      }).join('');

      totalSpan.textContent = `₦${total.toLocaleString()}`;
    }

    // 2. UPDATE QUANTITY
    window.updateQty = function(index, delta) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      if (!cart[index]) return;
      cart[index].qty += delta;
      if (cart[index].qty <= 0) {
        cart.splice(index, 1);
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      updateBadge(); // if we import badge function, but for simplicity we just reload badge via helper.
      // We'll just render and update badge separately.
      if (typeof window.updateBadge === 'function') window.updateBadge();
    };

    window.removeItem = function(index) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      if (typeof window.updateBadge === 'function') window.updateBadge();
    };

    // Simple badge update (reuse same logic as index)
    function updateBadge() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const count = cart.reduce((sum, item) => sum + item.qty, 0);
      // We don't have badge on this page, but we can add one if needed. Skip.
    }

    renderCart();
  </script>
</body>
</html>
